schema:
  - internal/handler/graph/*.graphqls

exec:
  filename: internal/handler/graph/generated.go
  package: graph

model:
  filename: internal/handler/graph/models_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: internal/handler/graph
  package: graph

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time

  Todo:
    model: github.com/nghiapd-andpad/todo-project-intern/services/bff-web/internal/domain/entity.Todo
    fields:
      creator:
        resolver: true

  TodoList:
    model: github.com/nghiapd-andpad/todo-project-intern/services/bff-web/internal/domain/entity.TodoList

  TodoStatus:
    model: github.com/nghiapd-andpad/todo-project-intern/services/bff-web/internal/domain/entity.TodoStatus

  Priority:
    model: github.com/nghiapd-andpad/todo-project-intern/services/bff-web/internal/domain/entity.Priority

  User:
    model: github.com/nghiapd-andpad/todo-project-intern/services/bff-web/internal/domain/entity.User
