syntax = "proto3";
package todo.v1;

import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nghiapd-andpad/todo-project-intern/proto/todo/v1;todov1";

service TodosService {
  // TodoList RPCs
  rpc GetTodoList(GetTodoListRequest) returns (GetTodoListResponse);
  rpc ListTodoLists(ListTodoListsRequest) returns (ListTodoListsResponse);
  rpc CreateTodoList(CreateTodoListRequest) returns (CreateTodoListResponse);
  rpc UpdateTodoList(UpdateTodoListRequest) returns (UpdateTodoListResponse);
  rpc DeleteTodoList(DeleteTodoListRequest) returns (DeleteTodoListResponse);

  // Todo RPCs
  rpc GetTodo(GetTodoRequest) returns (GetTodoResponse);
  rpc ListTodos(ListTodosRequest) returns (ListTodosResponse);
  rpc CreateTodo(CreateTodoRequest) returns (CreateTodoResponse);
  rpc UpdateTodo(UpdateTodoRequest) returns (UpdateTodoResponse);
  rpc DeleteTodo(DeleteTodoRequest) returns (DeleteTodoResponse);
}

enum TodoStatus {
  TODO_STATUS_UNSPECIFIED = 0;
  TODO_STATUS_PENDING = 1;
  TODO_STATUS_IN_PROGRESS = 2;
  TODO_STATUS_DONE = 3;
  TODO_STATUS_OVERDUE = 4;
}

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_LOW = 1;
  PRIORITY_MEDIUM = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_URGENT = 4;
}

// Messages for

message TodoList {
  // Format: users/{user_id}/todo-lists/{list_id}
  string name = 1;
  string display_name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetTodoListRequest {
  // Resource Name: users/{user_id}/todo-lists/{list_id}
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

message GetTodoListResponse {
  TodoList todo_list = 1;
}

message ListTodoListsRequest {
  // Parent Resource: users/{user_id}
  string parent = 1 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 20
  }];
  int32 offset = 3 [(buf.validate.field).int32 = {gte: 0}];
  string name_search = 4;
}

message ListTodoListsResponse {
  repeated TodoList todo_lists = 1;
  int64 total = 2;
}

message CreateTodoListRequest {
  // Parent Resource: users/{user_id}
  string parent = 1 [(buf.validate.field).string.min_len = 1];
  string display_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
}

message CreateTodoListResponse {
  TodoList todo_list = 1;
}

message UpdateTodoListRequest {
  TodoList todo_list = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

message UpdateTodoListResponse {
  TodoList todo_list = 1;
}

message DeleteTodoListRequest {
  // Resource Name: users/{user_id}/todo-lists/{list_id}
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteTodoListResponse {}

// Messages for Todo

message Todo {
  // Format: users/{user_id}/todo-lists/{list_id}/todos/{todo_id}
  string name = 1;
  string title = 2;
  string description = 3;
  TodoStatus status = 4;
  Priority priority = 5;
  google.protobuf.Timestamp due_date = 6;
  int64 assignee_id = 7;
  int64 creator_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message GetTodoRequest {
  // Resource Name: users/{user_id}/todo-lists/{list_id}/todos/{todo_id}
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

message GetTodoResponse {
  Todo todo = 1;
}

message ListTodosRequest {
  // Parent Resource: users/{user_id}/todo-lists/{list_id}
  string parent = 1 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 20
  }];
  int32 offset = 3 [(buf.validate.field).int32.gte = 0];
  TodoStatus status_filter = 4;
  Priority priority_filter = 5;
  string title_search = 6;
}

message ListTodosResponse {
  repeated Todo todos = 1;
  int64 total = 2;
}

message CreateTodoRequest {
  // Parent Resource: users/{user_id}/todo-lists/{list_id}
  string parent = 1 [(buf.validate.field).string.min_len = 1];
  string title = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  string description = 3;
  Priority priority = 4;
  // format: "2006-01-02"
  string due_date = 5;
  int64 assignee_id = 6;
}

message CreateTodoResponse {
  Todo todo = 1;
}

message UpdateTodoRequest {
  Todo todo = 1 [(buf.validate.field).required = true];
  google.protobuf.FieldMask update_mask = 2 [(buf.validate.field).required = true];
}

message UpdateTodoResponse {
  Todo todo = 1;
}

message DeleteTodoRequest {
  // Resource Name: users/{user_id}/todo-lists/{list_id}/todos/{todo_id}
  string name = 1 [(buf.validate.field).string.min_len = 1];
}

message DeleteTodoResponse {}
